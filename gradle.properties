# Enable AndroidX support for modern dependencies & Jetpack Compose
android.useAndroidX=true

# Enable R8/D8 optimization for clean code building
android.enableR8=true

# Suppress compileSdk 35 compatibility warning with AGP 8.5
android.suppressUnsupportedCompileSdk=35

# JVM arguments for faster Gradle builds
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
